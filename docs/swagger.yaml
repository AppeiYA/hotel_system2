basePath: /api/v1
definitions:
  hotel_system2_internal_reservation_domain.ReservationStatus:
    enum:
    - pending
    - confirmed
    - checked_in
    - checked_out
    - cancelled
    - no_show
    type: string
    x-enum-varnames:
    - ReservationStatusPending
    - ReservationStatusConfirmed
    - ReservationStatusCheckedIn
    - ReservationStatusCheckedOut
    - ReservationStatusCancelled
    - ReservationStatusNoShow
  hotel_system2_internal_shared_response.ErrorResponse:
    properties:
      error: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  hotel_system2_internal_shared_response.Response:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  internal_payment_adapters_http.initializePaymentRequest:
    properties:
      email:
        type: string
      reservation_id:
        type: string
    required:
    - email
    - reservation_id
    type: object
  internal_payment_adapters_http.initializePaymentResponse:
    properties:
      checkout_url:
        type: string
      reference:
        type: string
    type: object
  internal_reservation_adapters_http.CreateReservationRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
      room_id:
        type: string
    required:
    - check_in
    - check_out
    - email
    - first_name
    - last_name
    - phone
    - room_id
    type: object
  internal_reservation_adapters_http.reservationDetailsOnly:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      created_at:
        type: string
      guest_id:
        type: string
      id:
        type: string
      room_id:
        type: string
      status:
        $ref: '#/definitions/hotel_system2_internal_reservation_domain.ReservationStatus'
      total_amount:
        type: integer
    type: object
  internal_reservation_adapters_http.reservationResponse:
    properties:
      payment_id:
        type: string
      reservation:
        $ref: '#/definitions/internal_reservation_adapters_http.reservationDetailsOnly'
    type: object
  internal_room_adapters_http.roomResponse:
    properties:
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      rate_minor:
        type: integer
      room_number:
        type: string
      room_type:
        type: string
      status:
        type: string
    type: object
host: localhost:3333
info:
  contact: {}
  description: Hotel Reservation System API
  title: Hotel Reservation API
  version: "1.0"
paths:
  /payments/initialize:
    post:
      consumes:
      - application/json
      description: Initializes a payment session for a reservation.
      parameters:
      - description: Payment initialization request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_payment_adapters_http.initializePaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_payment_adapters_http.initializePaymentResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: Initialize Payment
      tags:
      - Payment
  /payments/webhook/{reference}:
    post:
      consumes:
      - application/json
      description: Confirms a payment session for a reservation.
      parameters:
      - description: Payment reference
        in: path
        name: reference
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: Confirm Payment
      tags:
      - Payment
  /reservations:
    get:
      description: Retrieve all reservations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_reservation_adapters_http.reservationResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: List all reservations
      tags:
      - Reservations
    post:
      consumes:
      - application/json
      description: Create a reservation for a guest
      parameters:
      - description: Reservation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_reservation_adapters_http.CreateReservationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_reservation_adapters_http.reservationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: Create a new reservation
      tags:
      - Reservations
  /reservations/{email}:
    get:
      description: Retrieve all reservations belonging to a guest email
      parameters:
      - description: Guest email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_reservation_adapters_http.reservationResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: List reservations by guest email
      tags:
      - Reservations
  /reservations/{id}/check-in:
    post:
      description: Check a guest into a reservation
      parameters:
      - description: Reservation ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: Check in guest
      tags:
      - Reservations
  /reservations/{id}/check-out:
    post:
      description: Check out a guest after ensuring the folio balance is settled
      parameters:
      - description: Reservation ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: Check out guest
      tags:
      - Reservations
  /rooms:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all available rooms
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/hotel_system2_internal_shared_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_room_adapters_http.roomResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/hotel_system2_internal_shared_response.ErrorResponse'
      summary: Get Rooms
      tags:
      - Rooms
schemes:
- http
swagger: "2.0"
